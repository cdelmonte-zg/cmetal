[[exercises]]
name = "error_handling1"
dir = "10_error_handling"
test = true
sanitizers = false
hints = [
  """
What happens when you divide by zero? The C standard says it's
undefined behavior — the program can crash or do anything.
""",
  """
Check b == 0 before dividing: if (b == 0) return MATH_DIV_ZERO;
""",
  """
There's another edge case: INT_MIN / -1 overflows because
|INT_MIN| > INT_MAX. Check: if (a == INT_MIN && b == -1) return MATH_OVERFLOW;
""",
]

[[exercises]]
name = "error_handling2"
dir = "10_error_handling"
test = true
sanitizers = true
hints = [
  """
The function doesn't check for NULL input. Dereferencing NULL
is undefined behavior — add a check at the very beginning.
""",
  """
After finding (or not finding) the comma, check if comma is NULL.
If no comma was found, return -2.
""",
  """
The helper is_valid_int() is called but its return value is ignored.
Use it: if (!is_valid_int(input, first_len)) return -3;
Don't modify *a or *b until validation passes.
""",
]

[[exercises]]
name = "error_handling3"
dir = "10_error_handling"
test = true
sanitizers = true
hints = [
  """
error_set() uses vsprintf() which has no buffer size limit.
If the formatted message is too long, it overflows the buffer.
""",
  """
Use vsnprintf(err->message, sizeof(err->message), fmt, args)
to limit the output to the buffer size.
""",
  """
parse_config_line() must validate all inputs:
  - Check line != NULL
  - Check '=' exists in line
  - Check key length fits in key_size
  - Check value length fits in value_size
Set a descriptive error message for each failure.
""",
]

# ── 11: Bitwise Operations ──────────────────────────────

[[exercises]]
name = "bitwise1"
dir = "11_bitwise"
test = true
sanitizers = false
hints = [
  """
count_set_bits() only loops 16 times — but unsigned int is 32 bits!
The loop also shifts n LEFT instead of RIGHT, corrupting the value.
""",
  """
Use while (n) { count += n & 1u; n >>= 1; } to count all set bits.
This naturally handles any number of bits.
""",
  """
is_power_of_two() returns 1 for n=0, but 0 is NOT a power of two.
Add a guard: return n != 0 && (n & (n - 1)) == 0;
""",
]

[[exercises]]
name = "bitwise2"
dir = "11_bitwise"
test = true
sanitizers = false
hints = [
  """
pack_rgb(): red should be shifted by 16 bits, green by 8.
Check that each component is cast to uint32_t before shifting.
""",
  """
unpack_rgb(): red is at bits 16-23, green at 8-15, blue at 0-7.
Shift right and mask with 0xFF.
""",
  """
extract_bits(): the mask should be (1u << count) - 1, not (1u << count).
The subtraction turns a single high bit into 'count' consecutive 1-bits.
""",
]

[[exercises]]
name = "bitwise3"
dir = "11_bitwise"
test = true
sanitizers = false
hints = [
  """
next_power_of_two() doubles exact powers of two (8 → 16 instead of 8).
You need to subtract 1 first: n-- before the bit-smearing.
""",
  """
The bit-smearing pattern fills all bits below the highest set bit:
  n |= n >> 1; n |= n >> 2; n |= n >> 4; ...
Then n + 1 gives the next power of two. But only after n--.
""",
  """
highest_set_bit() returns pos + 1 instead of pos.
Bit positions are 0-indexed: bit 0 is the LSB.
Just return pos directly.
""",
]

# ── 12: Encodings ───────────────────────────────────────
#
# Bytes on the wire: the techniques every binary format — and every
# bytecode file — is made of. Endianness, varints, bit packing.

[[exercises]]
name = "encodings1"
dir = "12_encodings"
test = true
sanitizers = true
hints = [
  """
Casting the buffer to uint32_t* makes three mistakes at once: the
bytes land in HOST order (not the format's), the cast breaks strict
aliasing (C11 6.5p7), and buf+1 makes the store misaligned — UBSan
flags that at runtime.
""",
  """
Write the four bytes yourself with shifts:
  buf[0] = value & 0xFF;  buf[1] = (value >> 8) & 0xFF;  ...
No cast, no alignment requirement, and the byte order is decided by
YOU, not by the CPU.
""",
  """
On the read side, remember ub3: buf[3] is promoted to signed int, so
buf[3] << 24 overflows for bytes >= 0x80. Cast first:
  (uint32_t)buf[0] | ((uint32_t)buf[1] << 8)
  | ((uint32_t)buf[2] << 16) | ((uint32_t)buf[3] << 24)
""",
]

[[exercises]]
name = "encodings2"
dir = "12_encodings"
test = true
sanitizers = true
hints = [
  """
Encoding is fine — the decoder is the problem: it trusts its input.
Decoding is PARSING, and parsers get fed garbage: truncated buffers,
endless continuation bits, values too big for the type.
""",
  """
Three checks are missing: stop at `len` (truncated input -> return 0),
stop at 5 bytes (a uint32_t varint can never need more), and reject a
5th byte carrying more than 4 payload bits (the value wouldn't fit —
accepting it would silently drop the top bits).
""",
  """
Structure the loop around the limit:
  for (size_t i = 0; i < len && i < 5; i++) { ... }
On the 5th byte check (bits >> 4) != 0 -> return 0. Write *out only
when the terminating byte was actually seen (see error_handling2:
no partial results from a failed parse).
""",
]

[[exercises]]
name = "encodings3"
dir = "12_encodings"
test = true
sanitizers = true
hints = [
  """
Two separate bugs. The first is bitwise2's precondition come true:
(1u << width) - 1 is undefined at width == 32 (shift by the full type
width, C11 6.5.7p3) — and THIS contract allows width 32.
""",
  """
Build the mask in a wider type, where << 32 is still in range:
  (uint32_t)((1ull << width) - 1)
The 64-bit accumulator in the loop is the same idea already applied.
""",
  """
The second bug: after the loop, up to 7 bits can still be sitting in
the accumulator. Flush them:
  if (nbits > 0) out[n++] = acc & 0xFF;
That's what makes the byte count (count*width + 7) / 8 — the +7 IS
the partial byte.
""",
]

# ── 13: Tagged Unions ───────────────────────────────────
#
# An enum plus a union: the workhorse of variant data — config values,
# protocol messages, reusable slots. The tag is a promise only your
# code keeps.

[[exercises]]
name = "tagged1"
dir = "13_tagged_unions"
test = true
sanitizers = true
hints = [
  """
Nothing connects the tag to the union but discipline: reading a member
the tag doesn't vouch for is reading memory that was never written.
Every accessor must check the tag FIRST — and free() must only run
for variants that actually own memory.
""",
  """
The accessor contract mirrors error_handling2: on a tag mismatch
return -1 and leave *out untouched — no partial results.
  if (v->type != CFG_NUMBER) return -1;
""",
  """
config_free: free only when the tag says CFG_STRING, then reset the
whole value with *v = config_null() — that also makes a second free
a harmless no-op. For equality, strings compare with strcmp, not ==
(function_pointers3, inside a union this time).
""",
]

[[exercises]]
name = "tagged2"
dir = "13_tagged_unions"
test = true
sanitizers = true
hints = [
  """
Two separate diseases: a case that FALLS THROUGH into the next
(missing break), and a default: that silently swallows every variant
you forgot — today MSG_CLOSE, tomorrow whatever you add next.
""",
  """
Don't just add the missing case — DELETE the default. With -Wall,
-Wswitch warns when a switch on an enum misses a case and has no
default; -Werror makes that a build failure. The compiler becomes
your exhaustiveness checker.
""",
  """
handle_message: three cases, each ending in break —
  case MSG_CLOSE: result = -m->as.close.code; break;
message_type_name: same, return "close" for MSG_CLOSE, and no default
in the switch (an unreachable return after it satisfies the compiler
for invalid values).
""",
]

[[exercises]]
name = "tagged3"
dir = "13_tagged_unions"
test = true
sanitizers = true
hints = [
  """
Two moments of truth for a union that OWNS memory: copying it (a
struct assignment copies the pointer — two owners, one buffer, and
the second free is a double free) and changing its variant (the old
payload's lifetime ends there — not freeing it is a leak).
""",
  """
attr_copy: for ATTR_TEXT allocate with CMETAL_MALLOC and copy the
bytes; return -1 with *dst untouched if the allocation fails (the
tests force that with cmetal_fail_next_alloc — a shallow copy that
allocates nothing cannot honor the contract). Other variants copy
by value.
""",
  """
Both attr_set_* start the transition by releasing the old payload:
attr_free(a) does exactly that. In attr_set_text, free the old value
only AFTER the new allocation succeeded, so a failed allocation
keeps the slot intact.
""",
]

[[exercises]]
name = "tagged4"
dir = "13_tagged_unions"
test = true
sanitizers = true
hints = [
  """
The idiom's entire contract is one word: FIRST. C11 6.7.2.1p15
guarantees no padding before a struct's first member, so a pointer to
the struct and a pointer to its first member are the same address —
that is what makes the (Node *) upcast valid. Where did Image put its
header?
""",
  """
Move `Node base;` to the top of Image. The order of the fields AFTER
the header is free; the header's position is not. Once it's first,
(Node *)img reads the real tag instead of a pixel count.
""",
  """
Second bug: in node_text_length, the NODE_IMAGE branch downcasts to
Paragraph — a copy-paste. The tag check buys nothing if the cast that
follows ignores it. An image has no text: return 0.
""",
]

# ── 14: Hash Tables ─────────────────────────────────────
#
# From the hash function to a growing, deleting, interning table —
# the index structure behind caches, routing tables and symbol pools.

[[exercises]]
name = "hash1"
dir = "14_hash_tables"
test = true
sanitizers = true
hints = [
  """
Two details ARE the algorithm: FNV-1a means xor-the-byte FIRST, then
multiply by the prime (multiply-first is FNV-1, a different function
with different published vectors) — and the byte must be UNSIGNED.
""",
  """
Plain char MAY be signed (it is on the current CI targets): for
bytes >= 0x80, (uint32_t)*p then sign-extends to 0xFFFFFFxx before
the xor — the bug is depending on that implementation choice at all.
Cast through uint8_t:
  hash ^= (uint8_t)*p;
""",
  """
The fixed loop body, in order:
  hash ^= (uint8_t)*p;
  hash *= FNV_PRIME;
The tests pin published vectors — if "" and "a" pass but "caf\\xE8"
fails, it's the sign; if everything fails, it's the order.
""",
]

[[exercises]]
name = "hash2"
dir = "14_hash_tables"
test = true
sanitizers = true
hints = [
  """
Linear probing has one word of truth: NEXT. After the last slot, the
next one is slot 0 — probes wrap. And probing is not just for
insertion: lookup must walk the same chain the insert walked.
""",
  """
Walk offsets, not raw indexes:
  for (n = 0; n < TABLE_CAPACITY; n++) {
      Entry *e = &t->entries[(start + n) % TABLE_CAPACITY];
      ...
  }
The modulo is the wraparound.
""",
  """
get() mirrors put(): probe from the home slot; an UNUSED slot ends
the chain (return -1), a key match returns the value, anything else
keeps probing. The "size"/"time" and "port"/"path"/"name" tests are
collision clusters computed offline — they exercise exactly these
two paths.
""",
]

[[exercises]]
name = "hash3"
dir = "14_hash_tables"
test = true
sanitizers = true
hints = [
  """
Deleting by clearing to EMPTY cuts the probe chain: lookups stop at
empty slots, so every key that probed PAST the deleted one becomes
unreachable. The slot needs a third state that says "someone lived
here": the tombstone.
""",
  """
Rules per state — get(): EMPTY ends the chain, TOMBSTONE is walked
through, USED is compared. delete(): mark SLOT_TOMBSTONE, not
SLOT_EMPTY.
""",
  """
put() must REUSE tombstones or ghosts eat the table (that's what
test_ghosts_do_not_fill_the_table checks): remember the first
tombstone passed while probing; if the chain ends without finding
the key, insert there instead of in a fresh slot.
""",
]

[[exercises]]
name = "hash4"
dir = "14_hash_tables"
test = true
sanitizers = true
hints = [
  """
Home slots are hash % capacity. Change the capacity and almost every
home MOVES: "size" lives at slot 4 of 8 but slot 12 of 16. A byte
copy preserves the old layout in a world with new geometry.
""",
  """
Growth = re-insert: for each old entry, probe the NEW array from
hash % new_cap and place it in the first free slot. (No tombstones
here: this table has no delete, so a plain probe suffices.)
""",
  """
Three more contract points: an UPDATE is not an insertion — look the
key up first, and only grow for real insertions (updating at high
load must neither grow nor fail); free the OLD array once the new one
is in place (the demo grows once — the leak sanitizer counts
generations); if the growth allocation fails return -1 with the table
untouched — cmetal_fail_next_alloc forces exactly that.
""",
]

[[exercises]]
name = "hash5"
dir = "14_hash_tables"
test = true
sanitizers = true
hints = [
  """
Interning is an identity contract: equal contents -> the SAME
pointer, forever. That requires two things this pool skips: looking
up before inserting, and OWNING a private copy of the string.
""",
  """
Lookup first:
  for each item: if strcmp(item, s) == 0 return item;
Only when absent does the pool allocate — which also means a failed
allocation can only happen for NEW strings (the tests rely on that:
re-interning an existing string succeeds even when allocation is
armed to fail).
""",
  """
Own the copy: allocate len+1 with CMETAL_MALLOC, memcpy, store the
copy — never the caller's pointer (their buffer will be reused; the
demo does it on purpose). On allocation failure return NULL with the
pool untouched.
""",
]

# ── 15: Arenas ──────────────────────────────────────────
#
# Lifetime by construction: allocate by bumping, free everything at
# once — and copy out whatever must survive.

[[exercises]]
name = "arena1"
dir = "15_arenas"
test = true
sanitizers = true
hints = [
  """
Two rules make a bump allocator: round the cursor UP to ARENA_ALIGN
before each allocation (or an odd-sized request misaligns the next
one), and stop at the end of the block (or the bump walks off it).
""",
  """
Alignment is a mask: start = (used + ALIGN-1) & ~(ALIGN-1).
The capacity check must come BEFORE the bump — and watch the form:
used + size can overflow. Guard size > capacity first, then compare
start > capacity - size (encodings2's lesson, allocator edition).
""",
  """
On a refused request return NULL and change NOTHING: the tests
allocate right after a refusal and expect the arena intact.
""",
]

[[exercises]]
name = "arena2"
dir = "15_arenas"
test = true
sanitizers = true
hints = [
  """
Two bugs: an oversized request (bigger than any block, present or
future) slips through the bounds check, and the fresh block replaces
the head WITHOUT linking to the previous generation — destroy then
frees only the newest block, and the leak sanitizer counts the rest.
""",
  """
Guard first: if (size > ARENA_BLOCK_SIZE) return NULL. Without it,
ARENA_BLOCK_SIZE - size underflows (both unsigned) and the check
silently passes — the same subtraction trap encodings2 pinned.
""",
  """
Growth is a push onto the chain:
  fresh->next = a->head;
  a->head = fresh;
destroy already walks ->next — it finds every generation as soon as
the chain is real.
""",
]

[[exercises]]
name = "arena3"
dir = "15_arenas"
test = true
sanitizers = true
hints = [
  """
The boundary rule: everything ALLOCATED for the request may live in
the scratch arena; everything RETURNED from the request must not —
it dies at arena_destroy, and the caller is still holding it. And a
missing '=' is a parse error, not a license to scan past the
terminator.
""",
  """
strchr(line, '=') returns NULL when absent: that's the error path
(return NULL). The tests also probe the empty line and "key=" (an
empty VALUE is valid; a missing delimiter is not).
""",
  """
Copy the value OUT: allocate with CMETAL_MALLOC (caller owns and
frees), memcpy len+1 bytes. Scratch keeps the temporaries — the key
copy in the solution stands for a real handler's per-request work.
test_result_escapes_the_arena checks structurally that the result is
not arena-owned; the demo checks it the hard way, after destroy.
""",
]

# ── 16: Garbage Collection ──────────────────────────────
#
# When references form a graph with cycles, ownership stops being a
# tree and free() has no single home: reachability from roots decides
# what lives. Mark, sweep, finalize.

[[exercises]]
name = "gc1"
dir = "16_gc"
test = true
sanitizers = true
hints = [
  """
Mark is graph traversal with a visited set — and the visited set is
already in the struct: the marked flag. Two properties to restore:
every reference is followed (not just refs[0]), and an already-marked
object is not entered again (or a cycle recurses until the stack
dies).
""",
  """
The guard comes FIRST:
  if (o->marked) return;
  o->marked = true;
Then the traversal is a loop over ref_count, recursing into each.
""",
  """
The tests count live objects: a root with two children keeps 3 alive
(kills the refs[0]-only walk), and a rooted A<->B cycle keeps 2 alive
and TERMINATES (kills the missing guard). Unrooting the cycle then
collects both — cycles are garbage like anything else once
unreachable.
""",
]

[[exercises]]
name = "gc2"
dir = "16_gc"
test = true
sanitizers = true
hints = [
  """
Two disciplines: freed objects must leave the all-list (or the next
walk threads through freed memory — the sweep's own loop already
reads o->next from a corpse), and marks must be cleared at the start
of every collection (or "reachable once" means "immortal").
""",
  """
Unlink with a pointer to pointer:
  Obj **link = &h->all;
  while (*link) {
      Obj *o = *link;
      if (!o->marked) { *link = o->next; free(o); ... }
      else            { link = &o->next; }
  }
One assignment removes any node — the head included, no special case.
""",
  """
Clear the marks in a first pass over the all-list, BEFORE marking
from roots. test_marks_do_not_leak_across_collections is the
scenario: reachable today, unrooted tomorrow — the next collection
must reclaim it.
""",
]

[[exercises]]
name = "gc3"
dir = "16_gc"
test = true
sanitizers = true
hints = [
  """
Two ownership decisions: the sweep must free what the object OWNS
(the name goes with the container — the demo's leak check counts the
strings left behind), and sharing contents must not share the
BUFFER: two owners of one allocation is a double free at sweep time.
""",
  """
In the sweep: free(o->name) before free(o) — finalize, then release.
heap_destroy already does it; the sweep must match.
""",
  """
obj_share_name duplicates: allocate len+1 (CMETAL_MALLOC), copy, and
free dst's OLD name only after the new allocation succeeded — a
failed share leaves dst unchanged (tagged3's transition rule). The
structural test pins a->name != b->name after sharing.
""",
]

# ── 17: NaN Boxing ──────────────────────────────────────
#
# An IEEE-754 double whose exponent bits are all ones and whose
# mantissa is nonzero is NaN — and the mantissa is free payload. One
# 64-bit word can carry a full double OR a tagged value. The topic is
# mask discipline: which bits mean what, on both sides of every
# encode/decode pair.

[[exercises]]
name = "nanbox1"
dir = "17_nan_boxing"
test = true
sanitizers = true
hints = [
  """
Two separate problems. First: 0.0/0.0 produces the quiet NaN — the
exact pattern this BOX_MASK claims as boxed space, so an ordinary
arithmetic result stops being a double. You do not own every NaN.
Second: look at what box_bool(true) collides with.
""",
  """
The boxed space must be a NaN subspace the canonical NaNs stay out
of: set one MORE mantissa bit. BOX_MASK = QNAN | (1 << 50) — now
(v & BOX_MASK) == BOX_MASK is false for the NaNs invalid operations
produce, both signs included. (Payload PROPAGATION means crafted NaN
payloads stay outside the representable domain — the header says so
explicitly; scoping the claim is part of the technique.)
""",
  """
box_bool should not build patterns arithmetically at all: return the
named singletons (b ? TRUE_VAL : FALSE_VAL). The broken OR made
false an unassigned pattern and true equal to NIL_VAL — the test
pins all three singletons pairwise distinct.
""",
]

[[exercises]]
name = "nanbox2"
dir = "17_nan_boxing"
test = true
sanitizers = true
hints = [
  """
box_int(-5): what does (uint64_t)i do to a negative int32_t? Print
the bits. Then look at where the tag field lives (bits 48-49) and
what just flooded it. For value_equal, try 0.0 and -0.0: equal
numbers, different bits.
""",
  """
Widening a signed integer sign-extends. Hop through (uint32_t)
first: (uint64_t)(uint32_t)i is exactly 32 payload bits, zeros
above. This is the general rule for packing: mask the payload to the
bits you mean BEFORE placing it.
""",
  """
value_equal needs a type dispatch: if both values are doubles,
compare as_double(a) == as_double(b) — IEEE equality makes
0.0 == -0.0 true and NaN != NaN false, both correct here. Everything
else compares by bit identity. (This is why memcmp on structs with
float fields is a bug, not an optimization.)
""",
]

[[exercises]]
name = "nanbox3"
dir = "17_nan_boxing"
test = true
sanitizers = true
hints = [
  """
Two masking mistakes, one per direction. Encoding: what does
& 0xffffffff keep of a 64-bit address? Decoding: what is still set
in the word as_ptr returns? The demo's crash is far from either —
it dereferences the mangled pointer.
""",
  """
box_ptr needs no cut at all: the contract covers addresses that fit
in the low 48 bits (mainstream user-space today), the tag occupies
the top bits, so PTR_TAG | (uintptr_t)p keeps the whole address. The
synthetic-address test uses payload bits above 32 precisely to catch
the truncation.
""",
  """
as_ptr must strip exactly what box_ptr added: (v & ~PTR_TAG). The
pair is symmetric or it is wrong — a rule that holds for every
encode/decode boundary, not just this one. And note is_ptr: sign bit
plus quiet NaN alone is NOT enough (the hardware's negative NaN has
both); bit 50 of BOX_MASK is what makes the pattern ours.
""",
]

# ── 18: Bytecode Dispatch ───────────────────────────────
#
# A dispatch loop over an instruction stream is a state machine over
# untrusted input, and its stack is a bounded resource. Decode
# defensively, refuse impossible operations, and keep jump tables in
# sync with the index space — none of which the compiler checks.

[[exercises]]
name = "bytecode1"
dir = "18_bytecode"
test = true
sanitizers = true
hints = [
  """
Three places trust the stream: the operand fetch (can the stream end
between an opcode and its operand?), the constant index (who says
it is inside the pool?), and the default case (is an unknown byte
noise or corruption?). The error codes name each failure — the tests
check for the SPECIFIC one.
""",
  """
Before reading an operand byte: if (pc >= chunk->code_len) return
ERR_TRUNCATED. After reading the index: if (idx >=
chunk->const_count) return ERR_BAD_CONST. Bounds first, then use —
the same shape as every network-parser check.
""",
  """
The default case returns ERR_BAD_OPCODE. Silently skipping unknown
instructions turns one corrupt byte into an arbitrarily wrong
execution — the truncated-stream test also shows why "run off the
end and report no-halt" is not the same as detecting truncation
where it happens.
""",
]

[[exercises]]
name = "bytecode2"
dir = "18_bytecode"
test = true
sanitizers = true
hints = [
  """
The stack has two failure ends: pop from empty (reads below the
array, sp wraps to (size_t)-1) and push past STACK_MAX (writes past
the end). Both are properties of the INPUT program, so both must
become ERR_STACK — the current push/pop signatures cannot even say
no.
""",
  """
Make the helpers refusable: int push(stack, sp, v) returning -1 when
*sp == STACK_MAX; int pop(stack, sp, double *out) returning -1 when
*sp == 0. The popped value moves to an out-parameter so the return
channel can carry the refusal.
""",
  """
Every call site converts a refusal into ERR_STACK: OP_ADD pops b,
pops a, pushes a+b — three checks. Note the boundary test: EXACTLY
STACK_MAX pushes is legal; the 17th is not. Off-by-one lives at
== STACK_MAX vs > STACK_MAX.
""",
]

[[exercises]]
name = "bytecode3"
dir = "18_bytecode"
test = true
sanitizers = true
flags = ["-std=gnu11", "-Wno-pedantic"]
hints = [
  """
Two bugs a switch would have caught. Run the mul test: 2 * 4 gives
-4 — which handler actually executed? Now trace OP_MUL (value 3)
into dispatch_table[3] and read the table's order against the
enum's. Then run 2 + 3 alone and watch it come back ERR_STACK.
""",
  """
The table is positional: slot N must hold the handler for opcode N.
The enum says OP_MUL = 3, OP_NEG = 4 — the table's last two entries
are swapped. Fix the ORDER, not the enum.
""",
  """
Handlers do not "break": control leaves only via an explicit
DISPATCH(). The add handler is missing its dispatch, so execution
falls through into the multiply handler — a forgotten break in a
switch, but with no -Wimplicit-fallthrough to warn. Every handler
ends with DISPATCH() or a return.
""",
]
