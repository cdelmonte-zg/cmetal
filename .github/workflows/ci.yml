name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  exercise-invariant:
    name: exercise invariant (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      # Every exercise must FAIL as shipped and every solution must PASS,
      # replicating Exercise::verify() exactly (per-exercise test/sanitizers/
      # flags from info.toml). Catches exercises pushed in their solved state.
      # Exercises with `compilers = [...]` restrictions are skipped on the
      # other compiler; their solutions are verified everywhere.
      - name: Check exercise invariant
        run: python3 scripts/check_exercises.py --compiler ${{ matrix.compiler }}

  learner-journey:
    name: learner journey (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo build
        run: cargo build --release

      # Drives the real binary through the full embedded-workspace
      # journey: init → list → first exercise fails as shipped →
      # every exercise solved and revealed → verify green, all recorded.
      - name: Simulate full learner journey
        run: >
          python3 scripts/simulate_learner.py
          --binary target/release/cmetal
          --compiler ${{ matrix.compiler }}

  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: cargo build
        run: cargo build --release

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

      - name: Unpack solutions
        run: python3 scripts/solutions_codec.py unpack --to /tmp/solutions_plain

      - name: Verify solutions (gcc)
        shell: bash
        run: |
          find /tmp/solutions_plain -name '*.c' | sort | while read -r f; do
            echo "::group::gcc $f"
            gcc -Wall -Wextra -Werror -pedantic -std=c11 -Iinclude -o /tmp/test_bin "$f" && /tmp/test_bin
            gcc -Wall -Wextra -Werror -pedantic -std=c11 -Iinclude -DTEST -o /tmp/test_bin "$f" && /tmp/test_bin
            echo "::endgroup::"
          done

      - name: Verify solutions (clang)
        shell: bash
        run: |
          find /tmp/solutions_plain -name '*.c' | sort | while read -r f; do
            echo "::group::clang $f"
            clang -Wall -Wextra -Werror -pedantic -std=c11 -Iinclude -o /tmp/test_bin "$f" && /tmp/test_bin
            clang -Wall -Wextra -Werror -pedantic -std=c11 -Iinclude -DTEST -o /tmp/test_bin "$f" && /tmp/test_bin
            echo "::endgroup::"
          done

      - name: Verify solutions with sanitizers
        shell: bash
        run: |
          find /tmp/solutions_plain -name '*.c' | sort | while read -r f; do
            echo "::group::sanitizer $f"
            gcc -fsanitize=address,undefined -fno-sanitize-recover=all -std=c11 -Iinclude -DTEST -g -o /tmp/test_bin "$f" && /tmp/test_bin
            echo "::endgroup::"
          done
