name: Release

# Build prebuilt binaries when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl => fully static binaries, no glibc version headaches
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          # both Apple targets build on the arm runner (cross-compile x86_64)
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          ARCHIVE="cmetal-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$ARCHIVE"
          cp "target/${{ matrix.target }}/release/cmetal" LICENSE README.md "$ARCHIVE"/
          tar -czf "$ARCHIVE.tar.gz" "$ARCHIVE"
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            cmetal-*.tar.gz
            cmetal-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            cmetal-*.tar.gz
            cmetal-*.tar.gz.sha256
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # skip prereleases like v0.2.0-rc1
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Update formula
        env:
          VERSION_TAG: ${{ github.ref_name }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set - skipping tap update (update Formula/cmetal.rb manually)"
            exit 0
          fi

          VERSION="${VERSION_TAG#v}"

          declare -A SHA
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            URL="https://github.com/cdelmonte-zg/cmetal/releases/download/${VERSION_TAG}/cmetal-${VERSION_TAG}-${target}.tar.gz"
            curl -fsSL -o /tmp/cmetal.tar.gz "$URL"
            SHA[$target]=$(sha256sum /tmp/cmetal.tar.gz | awk '{print $1}')
          done

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/cdelmonte-zg/homebrew-tap.git" tap
          cd tap
          mkdir -p Formula

          cat > Formula/cmetal.rb <<EOF
          class Cmetal < Formula
            desc "Small exercises to learn advanced C concepts - inspired by rustlings"
            homepage "https://github.com/cdelmonte-zg/cmetal"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/cdelmonte-zg/cmetal/releases/download/${VERSION_TAG}/cmetal-${VERSION_TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA[aarch64-apple-darwin]}"
              end
              on_intel do
                url "https://github.com/cdelmonte-zg/cmetal/releases/download/${VERSION_TAG}/cmetal-${VERSION_TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA[x86_64-apple-darwin]}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/cdelmonte-zg/cmetal/releases/download/${VERSION_TAG}/cmetal-${VERSION_TAG}-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${SHA[aarch64-unknown-linux-musl]}"
              end
              on_intel do
                url "https://github.com/cdelmonte-zg/cmetal/releases/download/${VERSION_TAG}/cmetal-${VERSION_TAG}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA[x86_64-unknown-linux-musl]}"
              end
            end

            def install
              bin.install "cmetal"
            end

            def caveats
              <<~EOS
                cmetal needs the exercises repository to run:
                  git clone https://github.com/cdelmonte-zg/cmetal.git
                  cd cmetal && cmetal
                A C compiler with C11 support (gcc or clang) is also required.
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/cmetal --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cmetal.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
          else
            git commit -m "cmetal ${VERSION}"
            git push
          fi
